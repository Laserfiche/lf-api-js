name: veracode-scan

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 6'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install pnpm
        run: npm install pnpm@latest-9 -g

      - name: Install dependencies
        run: pnpm install

      - name: Build solution
        run: pnpm run build

      - name: 'Create an empty ./veracode folder'
        run: 'mkdir -p ./veracode'

      - name: 'Compress js repository client v2 files'
        run: tar -czvf ./veracode/lf-repository-api-v2.tar.gz ./packages/lf-repository-api-client-v2/dist

      - name: 'Compress js api client core files'
        run: tar -czvf ./veracode/lf-client-core.tar.gz ./packages/lf-api-client-core-js/dist

      - name: 'Compress js repository client v1 files'
        run: tar -czvf ./veracode/lf-repository-api-v1.tar.gz ./packages/lf-repository-api-client-v1/dist

      - name: 'Compress lf-js-utils files'
        run: tar -czvf ./veracode/lf-js-utils.tar.gz ./packages/lf-js-utils/dist

      - name: 'Compress lf-api-js package files'
        run: tar -czvf ./veracode/lf-api-js.tar.gz ./packages/lf-api-js/dist ./packages/lf-api-js/cdn

      - name: Veracode Upload And Scan (Static Application Security Testing)
        uses: veracode/veracode-uploadandscan-action@0.2.10
        with:
          appname: 'lf-api-js'
          createprofile: true
          filepath: 'veracode'
          vid: '${{ secrets.VERACODE_API_ID }}'
          vkey: '${{ secrets.VERACODE_API_KEY }}'
          teams: 'GitHub - Open Source'

      - name: Generate npm package-lock.json for Veracode SCA
        run: |
          # Parse pnpm-lock.yaml directly — no subprocess, no buffer limit.
          # Then remove pnpm-lock.yaml so SourceClear uses only the npm lockfile.
          pip3 install pyyaml --quiet
          python3 - << 'EOF'
          import yaml, json

          with open('pnpm-lock.yaml') as f:
              lockfile = yaml.safe_load(f)

          packages = {'': {'name': 'lf-api-js', 'version': '0.0.1'}}

          for pkg_key, pkg_info in (lockfile.get('packages') or {}).items():
              last_at = pkg_key.rfind('@')
              if last_at <= 0:
                  continue
              name    = pkg_key[:last_at]
              version = pkg_key[last_at + 1:]
              resolution = (pkg_info or {}).get('resolution') or {}
              entry = {'version': version}
              if 'integrity' in resolution:
                  entry['resolved']  = 'https://registry.npmjs.org/{n}/-/{s}-{v}.tgz'.format(
                      n=name, s=name.split('/')[-1], v=version)
                  entry['integrity'] = resolution['integrity']
              elif 'tarball' in resolution:
                  entry['resolved'] = resolution['tarball']
              packages['node_modules/' + name] = entry

          lock = {'name': 'lf-api-js', 'lockfileVersion': 2, 'requires': True, 'packages': packages}
          with open('package-lock.json', 'w') as f:
              json.dump(lock, f, indent=2)
          print('Generated package-lock.json with {} packages'.format(len(packages) - 1))
          EOF
          rm pnpm-lock.yaml

      - name: Run Veracode Software Composition Analysis (SCA)
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        run: curl --silent --show-error --location https://download.sourceclear.com/ci.sh | sh -s -- scan ./ --update-advisor --allow-dirty
