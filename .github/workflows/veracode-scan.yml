name: veracode-scan

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 6'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install pnpm
        run: npm install pnpm@latest-9 -g

      - name: Install dependencies
        run: pnpm install

      - name: Build solution
        run: pnpm run build

      - name: 'Create an empty ./veracode folder'
        run: 'mkdir -p ./veracode'

      - name: 'Compress js repository client v2 files'
        run: tar -czvf ./veracode/lf-repository-api-v2.tar.gz ./packages/lf-repository-api-client-v2/dist

      - name: 'Compress js api client core files'
        run: tar -czvf ./veracode/lf-client-core.tar.gz ./packages/lf-api-client-core-js/dist

      - name: 'Compress js repository client v1 files'
        run: tar -czvf ./veracode/lf-repository-api-v1.tar.gz ./packages/lf-repository-api-client-v1/dist

      - name: 'Compress lf-js-utils files'
        run: tar -czvf ./veracode/lf-js-utils.tar.gz ./packages/lf-js-utils/dist

      - name: 'Compress lf-api-js package files'
        run: tar -czvf ./veracode/lf-api-js.tar.gz ./packages/lf-api-js/dist ./packages/lf-api-js/cdn

      - name: Veracode Upload And Scan (Static Application Security Testing)
        uses: veracode/veracode-uploadandscan-action@0.2.10
        with:
          appname: 'lf-api-js'
          createprofile: true
          filepath: 'veracode'
          vid: '${{ secrets.VERACODE_API_ID }}'
          vkey: '${{ secrets.VERACODE_API_KEY }}'
          teams: 'GitHub - Open Source'

      - name: Generate npm package-lock.json for Veracode SCA
        run: |
          # pnpm ls --json resolves the full dependency tree across all workspace packages.
          # We convert its output to an npm lockfile v2, which SourceClear can parse.
          node -e "
            const {execSync} = require('child_process');
            const fs = require('fs');
            const workspaces = JSON.parse(execSync('pnpm ls --json --recursive --depth=Infinity', {encoding:'utf8'}));
            const packages = {'': {}};
            const seen = new Set();
            const add = deps => Object.entries(deps || {}).forEach(([name, info]) => {
              if (seen.has(name) || !info.version) return;
              seen.add(name);
              packages['node_modules/' + name] = {version: info.version};
              add(info.dependencies);
            });
            workspaces.forEach(ws => { add(ws.dependencies); add(ws.devDependencies); });
            fs.writeFileSync('package-lock.json', JSON.stringify({name:'lf-api-js', lockfileVersion:2, requires:true, packages}));
            console.log('Generated package-lock.json — ' + (Object.keys(packages).length - 1) + ' packages');
          "

      - name: Run Veracode Software Composition Analysis (SCA)
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        run: curl --silent --show-error --location https://download.sourceclear.com/ci.sh | sh -s -- scan ./ --update-advisor --allow-dirty
